name: Security Audit

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6am UTC

jobs:
  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Audit backend dependencies
        working-directory: backend
        run: npm audit --production --audit-level=high
        continue-on-error: true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --production --audit-level=high
        continue-on-error: true

  security-lint:
    name: Security Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for potential hardcoded secrets..."
          # Check for common secret patterns (API keys, passwords, tokens)
          if grep -rn --include="*.js" --include="*.jsx" --include="*.ts" \
            -E "(sk-[a-zA-Z0-9]{20,}|password\s*=\s*['\"][^'\"]{8,}|AKIA[0-9A-Z]{16})" \
            --exclude-dir=node_modules --exclude-dir=dist . ; then
            echo "::warning::Potential hardcoded secrets found!"
          else
            echo "No hardcoded secrets detected."
          fi

      - name: Check for dangerous patterns
        run: |
          echo "Checking for dangerous code patterns..."
          ISSUES=0

          # Check for eval usage
          if grep -rn --include="*.js" "eval(" --exclude-dir=node_modules --exclude-dir=dist backend/ ; then
            echo "::warning::eval() usage found in backend"
            ISSUES=$((ISSUES+1))
          fi

          # Check for SQL string concatenation
          if grep -rn --include="*.js" -E "\\\$\{.*\}.*LIKE|LIKE.*\\\$\{" --exclude-dir=node_modules backend/src/routes/ ; then
            echo "::warning::Potential SQL injection via template literals"
            ISSUES=$((ISSUES+1))
          fi

          # Check for unsanitized dangerouslySetInnerHTML
          if grep -rn --include="*.jsx" "dangerouslySetInnerHTML" --exclude-dir=node_modules frontend/src/ | grep -v "DOMPurify" ; then
            echo "::warning::Unsanitized dangerouslySetInnerHTML usage"
            ISSUES=$((ISSUES+1))
          fi

          echo "Security lint complete. Issues found: $ISSUES"

      - name: Check .env is gitignored
        run: |
          if grep -q "^\.env$" .gitignore; then
            echo ".env is properly gitignored"
          else
            echo "::error::.env is NOT in .gitignore!"
            exit 1
          fi
